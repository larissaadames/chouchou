<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chouchou</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #111;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <!-- p5.js via CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>

    <!-- biblioteca de som do p5.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/addons/p5.sound.min.js"></script>

    <!-- classes principais (carregadas primeiro) -->
    <script src="src/Chouchou.js"></script>
    <script src="src/FoodSystem.js"></script>
    <script src="src/ChouchouLoader.js"></script>
    <script src="src/logica/Bola.js"></script>
    <script src="src/logica/PopupMinijogos.js"></script>

    <!-- cômodos (dependem das classes acima) -->
    <script src="src/comodos/Quarto.js"></script>
    <script src="src/comodos/Cozinha.js"></script>
    <script src="src/comodos/Jardim.js"></script>
    <script src="src/comodos/SalaJogos.js"></script>
    <script src="src/comodos/Loja.js"></script>
    
    <!-- minijogos -->
    <script src="src/minijogos/MinijogoBase.js"></script>
    <script src="src/minijogos/JogoComida.js"></script>
    <script src="src/minijogos/JogoQueda.js"></script>

    <!-- SceneManager (depende dos cômodos) -->
    <script src="src/SceneManager.js"></script>

    <!-- entrada do jogo -->
    <script src="sketch.js"></script>
  </body>
</html>
